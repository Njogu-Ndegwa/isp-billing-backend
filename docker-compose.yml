# ---------------------------------------------------------------------------
# Shared logging config.
#
# Default driver: json-file with rotation (50MB x 5 files = ~250MB max per
# container). This prevents the EC2 root volume from filling up when a
# container runs for weeks. Logs still live under
# /var/lib/docker/containers/<id>/ and are LOST when a container is removed
# (e.g. on `docker compose up` after a new image is pulled).
#
# To survive deploys, enable CloudWatch Logs by overriding the `logging:`
# block on individual services (see commented examples below). Requires the
# EC2 instance role to have `logs:CreateLogStream` + `logs:PutLogEvents` on
# the target log group.
# ---------------------------------------------------------------------------
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  db:
    image: postgres:15-alpine
    container_name: isp_billing_postgres
    environment:
      POSTGRES_DB: isp_billing_db
      POSTGRES_USER: isp_user
      POSTGRES_PASSWORD: isp_secure_pass_2024
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - isp-network
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isp_user -d isp_billing_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: njogundegwa/isp-billing:latest
    build: .
    container_name: isp_billing_app
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - isp-network
    environment:
      - DATABASE_URL=postgresql+asyncpg://isp_user:isp_secure_pass_2024@db:5432/isp_billing_db
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - MIKROTIK_HOST=${MIKROTIK_HOST:-10.0.0.2}
      - MIKROTIK_PORT=${MIKROTIK_PORT:-8728}
      - MIKROTIK_USERNAME=${MIKROTIK_USERNAME:-admin}
      - MIKROTIK_PASSWORD=${MIKROTIK_PASSWORD}
      - MPESA_CONSUMER_KEY=${MPESA_CONSUMER_KEY}
      - MPESA_CONSUMER_SECRET=${MPESA_CONSUMER_SECRET}
      - MPESA_SHORTCODE=${MPESA_SHORTCODE}
      - MPESA_PASSKEY=${MPESA_PASSKEY}
      - MPESA_CALLBACK_URL=${MPESA_CALLBACK_URL}
      - MPESA_ENVIRONMENT=${MPESA_ENVIRONMENT}
      # M-Pesa B2B Payouts (set these to enable automated reseller payouts)
      - MPESA_B2B_INITIATOR_NAME=${MPESA_B2B_INITIATOR_NAME:-DNDEGWA}
      - MPESA_B2B_INITIATOR_PASSWORD=${MPESA_B2B_INITIATOR_PASSWORD:-}
      - MPESA_B2B_SECURITY_CREDENTIAL=${MPESA_B2B_SECURITY_CREDENTIAL:-}
      - MPESA_B2B_RESULT_URL=${MPESA_B2B_RESULT_URL:-}
      - MPESA_B2B_TIMEOUT_URL=${MPESA_B2B_TIMEOUT_URL:-}
      - MPESA_B2B_DAILY_PAYOUT_ENABLED=${MPESA_B2B_DAILY_PAYOUT_ENABLED:-true}
      - SERVER_PUBLIC_IP=54.91.202.229
      - WG_MANAGER_URL=${WG_MANAGER_URL:-http://host.docker.internal:8729}
      - WG_MANAGER_SECRET=${WG_MANAGER_SECRET:-change-me-wg-secret}
      - PROVISION_BASE_URL=${PROVISION_BASE_URL:-https://isp.bitwavetechnologies.net}
      - L2TP_IPSEC_PSK=${L2TP_IPSEC_PSK:-BitwaveL2TP2026!Secure}
    volumes:
      - wg_sock:/var/run/wg-manager
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    # --- To ship `web` logs to CloudWatch (survive deploys), comment out the
    #     line above and uncomment this block. Then `docker compose up -d web`.
    # logging:
    #   driver: awslogs
    #   options:
    #     awslogs-region: us-east-1
    #     awslogs-group: /isp-billing/web
    #     awslogs-stream: web
    #     awslogs-create-group: "true"
    #     tag: "{{.Name}}/{{.ID}}"

  freeradius:
    build:
      context: ./radius
      dockerfile: Dockerfile
    image: isp-billing-radius:latest
    container_name: isp_billing_radius
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./radius/clients.conf:/etc/freeradius/clients.conf:ro
      - ./radius/mods-enabled/sql:/etc/freeradius/mods-enabled/sql:ro
      - ./radius/mods-available/sql:/etc/freeradius/mods-available/sql:ro
      - ./radius/sites-enabled/default:/etc/freeradius/sites-enabled/default:ro
      - ./radius/dictionary.mikrotik:/etc/freeradius/dictionary.mikrotik:ro
      - ./radius/dictionary:/etc/freeradius/dictionary:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - isp-network
    restart: unless-stopped
    logging: *default-logging
    # --- Optional: ship FreeRADIUS auth logs to CloudWatch
    # logging:
    #   driver: awslogs
    #   options:
    #     awslogs-region: us-east-1
    #     awslogs-group: /isp-billing/freeradius
    #     awslogs-stream: freeradius
    #     awslogs-create-group: "true"

  wg-manager:
    build: ./wg-manager
    container_name: isp_wg_manager
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      - WG_MANAGER_SECRET=${WG_MANAGER_SECRET:-change-me-wg-secret}
      - WG_INTERFACE=${WG_INTERFACE:-wg0}
      - L2TP_CHAP_SECRETS_PATH=/etc/ppp/chap-secrets
    volumes:
      - wg_sock:/var/run/wg-manager
      - /etc/ppp:/etc/ppp
    restart: unless-stopped
    logging: *default-logging

volumes:
  postgres_data:
  wg_sock:

networks:
  isp-network:
    driver: bridge
